name: Release scrcpy-mask

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: all
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
      publish_release:
        description: 'Create a draft release when running against a tag ref'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  windows:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: pwsh
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Set up msvc
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up msys
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            make
            diffutils
            gawk
            yasm
            pkg-config
          path-type: inherit

      - name: Cache FFmpeg build
        id: ffmpeg-cache
        uses: actions/cache@v5
        with:
          path: ffmpeg-7.1.2/ffmpeg-windows-x64
          key: ffmpeg-windows-x64-7.1.2-v0.5

      - name: Build FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: ./scripts/build-ffmpeg.sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x64

      - name: Build package
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/release/scrcpy-mask-windows-x64.zip
          name: scrcpy-mask-windows-x64

  macos:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: bash
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install packaging tools
        shell: bash
        run: |
          cargo install cargo-bundle
          brew install create-dmg

      - name: Cache FFmpeg build
        id: ffmpeg-cache
        uses: actions/cache@v5
        with:
          path: ffmpeg-7.1.2/ffmpeg-macos-arm64
          key: ffmpeg-macos-arm64-7.1.2-v0.5

      - name: Build FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-ffmpeg.sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64

      - name: Build package
        shell: bash
        run: ./scripts/package-macos.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/release/scrcpy-mask-macos-arm64.dmg
          name: scrcpy-mask-macos-arm64

  linux:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: bash
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            autoconf automake build-essential cmake git-core \
            libass-dev libfreetype6-dev libgnutls28-dev libmp3lame-dev libsdl2-dev libtool \
            libx11-dev libva-dev libvdpau-dev libdrm-dev \
            libvorbis-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            meson \
            ninja-build \
            pkg-config \
            texinfo \
            yasm \
            zip \
            zlib1g-dev

      - name: Cache FFmpeg build
        id: ffmpeg-cache
        uses: actions/cache@v5
        with:
          path: ffmpeg-7.1.2/ffmpeg-linux-x64
          key: ffmpeg-linux-x64-7.1.2-v0.5

      - name: Build FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-ffmpeg.sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-x64

      - name: Build package
        shell: bash
        run: ./scripts/package-linux.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/release/scrcpy-mask-linux-x64.zip
          name: scrcpy-mask-linux-x64

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || (inputs.publish_release && inputs.platform == 'all')) }}
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8

      - name: List downloaded files
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            scrcpy-mask-linux-x64/**
            scrcpy-mask-windows-x64/**
            scrcpy-mask-macos-arm64/**
